<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Viewport: viewport-fit=cover enables safe-area-inset for notched devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>JACKO™ | Ideas en Movimiento</title>
    <meta name="description" content="JACKO™ es la plataforma donde las ideas toman vida. Completa tareas, acumula puntos y accede a productos exclusivos." />
    <meta name="keywords" content="JACKO, skate, lifestyle, puntos, recompensas, Colombia" />
    <meta name="author" content="JACKO™" />
    <meta name="robots" content="index, follow" />

    <!-- Theme: matches manifest theme_color for consistent PWA chrome -->
    <meta name="theme-color" content="#d4621a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JACKO™" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JACKO™" />
    <meta property="og:title" content="JACKO™ | Ideas en Movimiento" />
    <meta property="og:description" content="JACKO™ es la plataforma donde las ideas toman vida. Completa tareas, acumula puntos y accede a productos exclusivos." />
    <meta property="og:url" content="https://jacko.com/" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@jacko" />
    <meta name="twitter:title" content="JACKO™ | Ideas en Movimiento" />
    <meta name="twitter:description" content="JACKO™ es la plataforma donde las ideas toman vida. Completa tareas, acumula puntos y accede a productos exclusivos." />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
