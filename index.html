    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0a0a0f" />

    <meta name="twitter:title" content="JACKO™ | Ideas en Movimiento" />
    <meta name="twitter:description" content="JACKO™ es la plataforma donde las ideas toman vida. Completa tareas, acumula puntos y accede a productos exclusivos." />

    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet" />
